# ===== CONFIGURATION SERVEUR =====
server.port=5000
server.servlet.context-path=/api

# ===== CONFIGURATION BASE DE DONNÉES =====
spring.datasource.url=jdbc:mysql://localhost:3306/netmapper?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true
spring.datasource.username=netmapper
spring.datasource.password=netmapper2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== CONFIGURATION JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== CONFIGURATION JWT =====
jwt.secret=VotreCleSuperSecreteNetMapper2026PourJWTTokenSecurise
jwt.expiration=86400000

# ===== CONFIGURATION CORS =====
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH
spring.web.cors.allowed-headers=*

# ===== RESSOURCES STATIQUES =====
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ===== CONFIGURATION ENCODAGE =====
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ===== CONFIGURATION UPLOAD FICHIERS =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== DEVTOOLS =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true