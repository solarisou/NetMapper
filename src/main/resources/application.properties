# ============================================================================
# NETMAPPER - Configuration Spring Boot
# ============================================================================
# Projet: NetMapper
# Version: 1.0
# Date: Janvier 2026
# ============================================================================

# ===== SERVEUR =====
server.port=8081
server.address=localhost
server.servlet.context-path=/api

# ===== BASE DE DONNÉES MYSQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/netmapper?useSSL=false&serverTimezone=UTC
spring.datasource.username=netmapper
spring.datasource.password=netmapper2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
# validate = vérifier que le schéma correspond aux entités
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===== LOGGING =====
logging.level.root=INFO
logging.level.com.sms.netmapper=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== SÉCURITÉ JWT =====
# Clé secrète pour signer les tokens JWT (À CHANGER EN PRODUCTION !)
jwt.secret=NetMapper2026SecretKeyForJWTTokenGenerationAndValidationSMS
# Durée de validité du token en millisecondes (1 heure = 3600000)
jwt.expiration=3600000

# ===== CORS (pour React frontend) =====
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ===== UPLOAD DE FICHIERS =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== ENCODAGE =====
spring.mandatory-file-encoding=UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# ===== MESSAGES D'ERREUR =====
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ===== JACKSON (JSON) =====
#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ===== DEVTOOLS (Rechargement automatique) =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ============================================================================
# FIN DE LA CONFIGURATION
# ============================================================================
